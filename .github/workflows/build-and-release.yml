name: Build and Release

on:
  push:
    tags:
      - 'v*' # v0.1.0 などのタグがプッシュされたときにリリースビルドを実行
  workflow_dispatch: # GitHubの画面からいつでも手動で実行できるようにする

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: apps/stream-companion/electron-app
        run: npm install

      - name: Build and Package
        working-directory: apps/stream-companion/electron-app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release App
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            apps/stream-companion/electron-app/release/*.exe
            apps/stream-companion/electron-app/release/*.dmg
            apps/stream-companion/electron-app/release/*.zip
            apps/stream-companion/electron-app/release/*.deb
            apps/stream-companion/electron-app/release/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
